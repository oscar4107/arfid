<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARFID</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation with links on either side of header -->
    <nav class="top-nav">
        <div class="nav-left">
            <a href="index.html" class="nav-link">Arfid</a>
        </div>
        
        <h1 class="site-title">RANTS</h1>
        
        <div class="nav-right">
            <a href="films.html" class="nav-link">Films</a>
        </div>
    </nav>

    <!-- Centered rant box -->
    <div class="rant-container">
        <div class="rant-box">
            <h2 class="rant-title">Today's Rant</h2>
            <div class="rant-content" contenteditable="true">

            </div>
            <div class="rant-footer">
                <span class="rant-date">March 7, 2026</span>
                <button class="rant-save">Save Rant</button>
            </div>
        </div>
    </div>
</body>
